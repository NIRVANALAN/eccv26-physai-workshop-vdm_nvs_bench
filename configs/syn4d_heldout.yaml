# Syn4D held-out track — paired target-view GT exists.
# Camera accuracy = VGGT-Omega recovered pose vs exact GT trajectory.
# Video quality  = paired FVD (pred vs gt) + CLIP-V(source,pred) + CLIP-F/T + VBench.
# Paired NVS     = PSNR / SSIM / LPIPS against the GT target video.
track: syn4d
components: [camera, video, paired, vbench]
num_frames: 49
target_w: 512
target_h: 288
fvd_size: 256
clip_model: "hf-hub:laion/CLIP-ViT-H-14-laion2B-s32B-b79K"
# Expected roots (pass on the CLI):
#   --pred <root>/<seq>/<traj>/pred.mp4
#   --gt <root>/<seq>/<traj>/gt.mp4        (paired target-view GT)
#   --cameras <root>/<seq>/<traj>.npz      (key cam_c2w = GT trajectory)
#   --source <root>/<seq>/<traj>/source.mp4
